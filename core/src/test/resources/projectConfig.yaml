name: "Scala SBT Development Container"
modules:
  - mise
forwardPorts:
  - 8080
  - "8000:9000"
remoteEnv:
  - name: "SBT_OPTS"
    value: "-Xmx2G -XX:+UseG1GC"
  - name: "JAVA_HOME"
    value: "/usr/lib/jvm/java-17-openjdk-amd64"
containerEnv:
  - name: "EXAMPLE"
    value: "foo"
  - name: "EXAMPLE+2"
    value: "bar"
plugins:
  intellij:
    - "org.intellij.scala"
    - "com.github.gtache.lsp"
  vscode:
    - "scalameta.metals"
    - "scala-lang.scala"
mounts:
  - source: "${localWorkspaceFolder}/.ivy2"
    target: "/home/vscode/.ivy2"
    type: "volume"
  - source: "${localWorkspaceFolder}/.sbt"
    target: "/home/vscode/.sbt"
    type: "volume"
onCreateCommand:
  - logLine: "onCreateCommand"
    cmd: "echo onCreateCommand"
    workingDirectory: "/workspaces/project/subdir"
postCreateCommand:
  - logLine: "postCreateCommand1"
    cmd: "sbt update"
    workingDirectory: "/workspaces/project/subdir"
  - logLine: "postCreateCommand2"
    cmd: "sbt compile"
    workingDirectory: "subdir"
postStartCommand:
  - logLine: "postStartCommand"
    cmd: "echo 'Container started successfully'"
    workingDirectory: "."
features:
  "ghcr.io/devcontainers/features/docker-in-docker:1": {}
updateRemoteUserUID: true
